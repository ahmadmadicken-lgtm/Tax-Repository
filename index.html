<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Academy 2026 — Active Tax Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0b0f;--bg2:#111318;--bg3:#181b22;--bg4:#1e222c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --accent:#f59e0b;--accent2:#fbbf24;--accent3:#fde68a;
  --blue:#3b82f6;--green:#10b981;--red:#ef4444;--purple:#8b5cf6;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --sw:240px;--th:60px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
#sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sb-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sb-logo-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--accent)}
.sb-logo-sub{font-size:0.72rem;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace}
.sb-xp{padding:14px 20px;border-bottom:1px solid var(--border)}
.sb-xp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.sb-level{font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;color:var(--accent)}
.sb-xp-val{font-size:0.75rem;color:var(--text3);font-family:'DM Mono',monospace}
.xp-bar{background:var(--bg4);border-radius:4px;height:5px;overflow:hidden}
.xp-fill{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;border-radius:4px;transition:width 0.5s ease}
.sb-streak{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:0.75rem;color:var(--text2)}
.sb-nav{padding:12px;flex:1}
.sb-nav-label{font-size:0.65rem;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:0.85rem;color:var(--text2);transition:all 0.15s;margin-bottom:2px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(245,158,11,0.12);color:var(--accent)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--accent);color:#000;font-size:0.65rem;font-weight:700;padding:1px 6px;border-radius:10px}
#topbar{position:fixed;left:var(--sw);right:0;top:0;height:var(--th);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:16px;z-index:90}
.tb-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;flex:1}
.tb-badge{background:var(--bg4);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:0.75rem;display:flex;align-items:center;gap:5px;color:var(--text2)}
.tb-badge.lit{color:var(--accent);border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.08)}
#main{margin-left:var(--sw);margin-top:var(--th);padding:28px;min-height:calc(100vh - var(--th))}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-sm{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px}
.section-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.dash-hero{background:linear-gradient(135deg,rgba(245,158,11,0.12),rgba(59,130,246,0.08));border:1px solid rgba(245,158,11,0.2);border-radius:16px;padding:28px;margin-bottom:24px}
.dash-hero-title{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800}
.dash-hero-sub{color:var(--text2);font-size:0.9rem;margin-top:6px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px}
.stat-val{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800}
.stat-lbl{font-size:0.75rem;color:var(--text3);margin-top:4px}
.stat-card.ca{border-color:rgba(245,158,11,0.25);background:rgba(245,158,11,0.05)}.stat-card.ca .stat-val{color:var(--accent)}
.stat-card.cb{border-color:rgba(59,130,246,0.25);background:rgba(59,130,246,0.05)}.stat-card.cb .stat-val{color:var(--blue)}
.stat-card.cc{border-color:rgba(16,185,129,0.25);background:rgba(16,185,129,0.05)}.stat-card.cc .stat-val{color:var(--green)}
.stat-card.cd{border-color:rgba(139,92,246,0.25);background:rgba(139,92,246,0.05)}.stat-card.cd .stat-val{color:var(--purple)}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.mc:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.mc.c0::before{background:var(--accent)}.mc.c1::before{background:var(--blue)}.mc.c2::before{background:var(--green)}
.mc.c3::before{background:var(--purple)}.mc.c4::before{background:#ec4899}.mc.c5::before{background:#f97316}
.mc.c6::before{background:#06b6d4}.mc.c7::before{background:#84cc16}
.mc-emoji{font-size:2rem;margin-bottom:12px}
.mc-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:6px}
.mc-desc{font-size:0.8rem;color:var(--text3);line-height:1.5}
.mc-prog{margin-top:14px}
.mc-bar{background:var(--bg4);border-radius:3px;height:4px;overflow:hidden;margin-top:6px}
.mc-fill{height:100%;border-radius:3px;transition:width 0.4s ease}
.mc.c0 .mc-fill{background:var(--accent)}.mc.c1 .mc-fill{background:var(--blue)}.mc.c2 .mc-fill{background:var(--green)}
.mc.c3 .mc-fill{background:var(--purple)}.mc.c4 .mc-fill{background:#ec4899}.mc.c5 .mc-fill{background:#f97316}
.mc.c6 .mc-fill{background:#06b6d4}.mc.c7 .mc-fill{background:#84cc16}
.mc-meta{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text3)}
.lw{max-width:780px}
.bc{font-size:0.75rem;color:var(--text3);margin-bottom:10px;cursor:pointer}
.bc span{color:var(--accent)}
.ltabs{display:flex;gap:6px;margin-bottom:20px}
.ltab{padding:6px 14px;border-radius:6px;font-size:0.8rem;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text3);transition:all 0.15s}
.ltab.active{background:var(--accent);color:#000;border-color:var(--accent)}
.ltab.done{background:rgba(16,185,129,0.15);color:var(--green);border-color:rgba(16,185,129,0.3)}
.lc{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:28px}
.lc-tag{display:inline-block;background:rgba(245,158,11,0.15);color:var(--accent);font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:4px;font-family:'DM Mono',monospace;margin-bottom:14px;letter-spacing:0.5px}
.lc-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:16px}
.lc-body{font-size:0.88rem;line-height:1.75;color:var(--text2)}
.lc-body h3{font-family:'Syne',sans-serif;color:var(--text);font-size:1rem;font-weight:700;margin:20px 0 10px}
.abox{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);border-left:3px solid var(--accent);border-radius:8px;padding:14px 16px;margin:16px 0}
.abox-lbl{font-size:0.7rem;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace;letter-spacing:0.5px;margin-bottom:6px}
.fbox{background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:14px 16px;margin:16px 0;font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--accent3);line-height:1.8}
.wbox{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-left:3px solid var(--red);border-radius:8px;padding:12px 14px;margin:14px 0;font-size:0.83rem}
.ibox{background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);border-left:3px solid var(--blue);border-radius:8px;padding:12px 14px;margin:14px 0;font-size:0.83rem}
.sbox{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-left:3px solid var(--green);border-radius:8px;padding:12px 14px;margin:14px 0;font-size:0.83rem}
table.tt{width:100%;border-collapse:collapse;margin:16px 0;font-size:0.82rem}
table.tt th{background:var(--bg4);padding:9px 12px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border2);font-family:'DM Mono',monospace;font-size:0.75rem}
table.tt td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top}
table.tt tr:last-child td{border-bottom:none}
table.tt .yes{color:var(--green);font-weight:600}
table.tt .no{color:var(--red);font-weight:600}
.qw{max-width:680px}
.qq{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:20px;line-height:1.5}
.qopts{display:flex;flex-direction:column;gap:10px}
.qopt{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;font-size:0.88rem;transition:all 0.15s;display:flex;align-items:flex-start;gap:12px}
.qopt:hover{border-color:var(--border2);background:var(--bg4)}
.qopt.sel{border-color:var(--accent);background:rgba(245,158,11,0.08);color:var(--accent)}
.qopt.ok{border-color:var(--green);background:rgba(16,185,129,0.1);color:var(--green)}
.qopt.ng{border-color:var(--red);background:rgba(239,68,68,0.08);color:var(--red)}
.ql{width:22px;height:22px;border-radius:50%;background:var(--bg4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace}
.qexp{margin-top:16px;padding:14px 16px;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:8px;font-size:0.84rem;color:var(--text2);line-height:1.6}
.qexp.ng2{background:rgba(239,68,68,0.06);border-color:rgba(239,68,68,0.2)}
.qprog{display:flex;gap:4px;margin-bottom:20px}
.qpd{flex:1;height:4px;border-radius:2px;background:var(--bg4)}
.qpd.done{background:var(--green)}.qpd.cur{background:var(--accent)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;font-family:'DM Sans',sans-serif}
.btn-p{background:var(--accent);color:#000}.btn-p:hover{background:var(--accent2)}
.btn-s{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}.btn-s:hover{background:var(--bg4)}
.btn-o{background:transparent;color:var(--text2);border:1px solid var(--border2)}.btn-o:hover{color:var(--text);background:var(--bg3)}
.btn-sm{padding:7px 14px;font-size:0.8rem}
.stabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.stab{padding:7px 14px;border-radius:7px;font-size:0.8rem;font-weight:600;cursor:pointer;border:1px solid var(--border);color:var(--text3);transition:all 0.15s}
.stab.active{background:rgba(59,130,246,0.15);color:var(--blue);border-color:rgba(59,130,246,0.3)}
.fg{margin-bottom:16px}
.fl{font-size:0.78rem;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.fi{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:9px 12px;color:var(--text);font-size:0.88rem;font-family:'DM Sans',sans-serif;width:100%;outline:none;transition:border-color 0.15s}
.fi:focus{border-color:var(--blue)}
.fs{background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:9px 12px;color:var(--text);font-size:0.88rem;font-family:'DM Sans',sans-serif;width:100%;outline:none;cursor:pointer}
.rb{background:var(--bg4);border:1px solid var(--border2);border-radius:10px;padding:18px;margin-top:16px}
.rr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.85rem}
.rr:last-child{border-bottom:none}
.rr.tot{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;padding-top:10px;margin-top:4px}
.rr .rv{font-family:'DM Mono',monospace;color:var(--accent)}
.rr.tot .rv{font-size:1.1rem;color:var(--green)}
.kbd{margin-bottom:20px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.kbh{padding:16px 20px;background:var(--bg3);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;transition:background 0.15s}
.kbh:hover{background:var(--bg4)}
.kbb{padding:20px;background:var(--bg2);display:none}
.kbb.open{display:block}
.kbb h4{font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;color:var(--accent);margin:16px 0 8px}
.kbb h5{font-size:0.85rem;font-weight:600;color:var(--text);margin:12px 0 6px}
.kbb p{font-size:0.84rem;line-height:1.7;color:var(--text2);margin-bottom:8px}
.kbb ul{padding-left:18px;margin-bottom:10px}
.kbb li{font-size:0.83rem;color:var(--text2);line-height:1.65;margin-bottom:3px}
.kbt{width:100%;border-collapse:collapse;margin:10px 0;font-size:0.8rem}
.kbt th{background:var(--bg4);padding:7px 10px;text-align:left;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:0.72rem}
.kbt td{padding:6px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
.kbt tr:last-child td{border-bottom:none}
.ktag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:700;font-family:'DM Mono',monospace;margin:2px}
.ktag.law{background:rgba(59,130,246,0.15);color:var(--blue)}
.ktag.new{background:rgba(16,185,129,0.15);color:var(--green)}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.bc2{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;transition:all 0.2s}
.bc2.earned{border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.05)}
.bc2:not(.earned){filter:grayscale(1);opacity:0.5}
.bi{font-size:2.2rem;margin-bottom:8px}
.bn{font-size:0.8rem;font-weight:600;margin-bottom:4px}
.bd{font-size:0.7rem;color:var(--text3)}
#toast{position:fixed;bottom:28px;right:28px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:14px 18px;font-size:0.85rem;z-index:999;transform:translateY(80px);opacity:0;transition:all 0.3s;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
#toast.show{transform:translateY(0);opacity:1}
.chev{transition:transform 0.2s;display:inline-block}
.chev.open{transform:rotate(180deg)}
.fx{display:flex}.fxc{align-items:center}.fxb{justify-content:space-between}
.mt4{margin-top:16px}.mt6{margin-top:24px}.mb4{margin-bottom:16px}.mb3{margin-bottom:12px}
.ta{color:var(--accent)}.tg{color:var(--green)}.tb2{color:var(--blue)}.tr{color:var(--red)}.tm{color:var(--text3)}
.tsm{font-size:0.8rem}.txs{font-size:0.72rem}.fb{font-weight:700}.fsyn{font-family:'Syne',sans-serif}.fmono{font-family:'DM Mono',monospace}
</style>
</head>

<aside id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-title">⚡ Tax Academy</div>

  <div class="sb-xp">

</aside>

<script>
<script>
const LVL_NAMES=['Pemula','Dasar','Lanjut','Mahir','Expert','Master'];
const LVL_XP=[0,500,1200,2200,3500,5000];
let STATE={xp:0,level:1,streak:1,cm:{},quizScore:null};
let LS={mi:0,li:0};
let QS={active:false,qs:[],cur:0,score:0,answered:false,sel:null};
let simTab=0;

const MODS=[
{title:'KUP & Coretax Dasar',emoji:'🔐',color:'c0',day:'Hari 1-2',
 desc:'Integrasi NIK-NPWP, Akun Wajib Pajak, Pembukuan vs Pencatatan',
 levels:[
 {label:'Beginner',title:'NIK = NPWP Baru',tag:'KUP & CORETAX',
  analogy:'Bayangkan NPWP lama seperti KTP biru fisik — perlu dicetak, bisa hilang. Sekarang NIK Anda otomatis jadi identitas pajak digital, seperti sidik jari yang tidak bisa dihilangkan.',
  body:`<h3>Integrasi NIK sebagai NPWP</h3>
<p>Berdasarkan <b>PENG-6/PJ.09/2024</b> dan <b>PMK 81/2024</b>:</p>
<table class="tt"><tr><th>Jenis WP</th><th>Format NPWP</th></tr>
<tr><td>WP OP Penduduk Indonesia</td><td>NIK (16 digit) ATAU NPWP 15 digit</td></tr>
<tr><td>WP OP Bukan Penduduk</td><td>NPWP 15 digit</td></tr>
<tr><td>WP Badan, Instansi Pemerintah</td><td>NPWP 15 digit</td></tr></table>
<h3>Akun Wajib Pajak (AWP)</h3>
<p>AWP adalah "inbox resmi" WP di portal Coretax. Semua surat DJP — SKP, SP2DK, keputusan — masuk ke sini. <b>Tanggal masuk ke AWP = tanggal resmi diterimanya dokumen.</b></p>`,
  quiz:[{q:'Sejak kapan NIK dapat digunakan sebagai NPWP?',opts:['Sejak 2018','Sejak Januari 2024','Sejak 2025','Sejak UU HPP berlaku'],ans:1,exp:'Berdasarkan PENG-6/PJ.09/2024, format NPWP baru (NIK untuk WP OP penduduk) berlaku sejak Januari 2024.'}]},
 {label:'Dasar',title:'SKP & Sanksi Terbaru',tag:'SURAT KETETAPAN PAJAK',
  analogy:'SKP seperti "tagihan resmi" dari DJP. Ada berbagai jenis: tagihan biasa (STP), tagihan kurang bayar (SKPKB), sampai tagihan lebih bayar (SKPLB). Mirip seperti berbagai jenis nota dari toko.',
  body:`<h3>Hierarki Produk Hukum Pajak</h3>
<table class="tt"><tr><th>Kode</th><th>Nama</th><th>Fungsi</th></tr>
<tr><td class="fmono ta">STP</td><td>Surat Tagihan Pajak</td><td>Tagih pajak + sanksi administratif</td></tr>
<tr><td class="fmono ta">SKPKB</td><td>SKP Kurang Bayar</td><td>Pokok pajak + kredit + kekurangan + sanksi</td></tr>
<tr><td class="fmono ta">SKPKBT</td><td>SKP KB Tambahan</td><td>Tambahan bila ada data baru</td></tr>
<tr><td class="fmono ta">SKPN</td><td>SKP Nihil</td><td>Pokok = kredit pajak</td></tr>
<tr><td class="fmono ta">SKPLB</td><td>SKP Lebih Bayar</td><td>Ada kelebihan pembayaran</td></tr></table>
<h3>Sanksi Bunga SKPKB (UU HPP)</h3>
<div class="fbox">Sanksi = (Suku Bunga Acuan + 20%) ÷ 12 × per bulan
Maksimum: 24 bulan — TIDAK lagi flat 2%/bulan!</div>`,
  quiz:[{q:'Berapa batas waktu DJP menerbitkan SKPKB setelah masa pajak berakhir?',opts:['1 tahun','3 tahun','5 tahun','10 tahun'],ans:2,exp:'Pasal 13 UU KUP: DJP berwenang menerbitkan SKPKB dalam jangka waktu 5 tahun.'}]},
 {label:'Lanjut',title:'Keberatan & Banding',tag:'HUKUM ACARA PAJAK',
  analogy:'Alur sengketa pajak seperti banding sepak bola: protes ke wasit dulu (Keberatan), kalau tidak puas naik ke komite disiplin (Banding ke Pengadilan Pajak), baru ke FIFA (PK di MA).',
  body:`<h3>Alur Sengketa Pajak</h3>
<div class="fbox">SPT → Pemeriksaan → SKPKB
↓ KEBERATAN (3 bln sejak SKPKB) → SK Keberatan 12 bln
↓ BANDING (3 bln sejak SK Keberatan) → Putusan
↓ PENINJAUAN KEMBALI (Mahkamah Agung)</div>
<div class="wbox">⚠️ <b>Syarat Banding:</b> WP wajib membayar 50% dari pajak terutang SKPKB sebagai syarat pengajuan banding.</div>
<h3>Sanksi Bila Kalah</h3>
<table class="tt"><tr><th>Tahap</th><th>Sanksi</th></tr>
<tr><td>Keberatan ditolak, tidak banding</td><td>50% × (pajak SK Keberatan − yang dibayar)</td></tr>
<tr><td>Banding ditolak</td><td>100% × (pajak Putusan Banding − yang dibayar)</td></tr></table>`,
  quiz:[{q:'Berapa sanksi bila keberatan ditolak dan WP tidak mengajukan banding?',opts:['25%','50% dari selisih','100% pajak terutang','2%/bulan'],ans:1,exp:'Pasal 25(9) UU KUP: sanksi denda 50% dari pajak berdasarkan SK Keberatan dikurangi yang telah dibayar.'}]},
 {label:'Expert',title:'SP2DK & Mitigasi Coretax',tag:'DATA ANALYTICS DJP',
  analogy:'SP2DK adalah "early warning" DJP — seperti notifikasi dari bank saat ada transaksi mencurigakan. Lebih baik Anda yang proaktif rekonsiliasi daripada menunggu SP2DK yang berujung pemeriksaan.',
  body:`<h3>Strategi Mitigasi SP2DK</h3>
<table class="tt"><tr><th>Langkah</th><th>Tindakan</th></tr>
<tr><td>1. Cek AWP rutin</td><td>Login Coretax minimal 2x/minggu</td></tr>
<tr><td>2. Rekonsiliasi proaktif</td><td>SPT PPN vs PPh Badan tiap kuartal</td></tr>
<tr><td>3. Tanggapi tepat waktu</td><td>Respons dalam <b>14 hari kerja</b> sejak diterima</td></tr>
<tr><td>4. Jangan abaikan</td><td>Tidak direspons → Surat Perintah Pemeriksaan</td></tr></table>
<div class="sbox">✅ Bila ada gap legitimate: ajukan <b>pembetulan SPT</b> sebelum berlanjut ke pemeriksaan — sanksi pembetulan lebih ringan dari sanksi SKPKB.</div>`,
  quiz:[{q:'Berapa lama batas waktu respons SP2DK sejak diterima di AWP?',opts:['7 hari kalender','14 hari kerja','30 hari kalender','21 hari kerja'],ans:1,exp:'Prosedur SP2DK Coretax: WP wajib merespons dalam 14 hari kerja sejak SP2DK diterima di AWP.'}]}
]},

 {label:'Lanjut',title:'TER — Tarif Efektif Rata-rata',tag:'PP 58/2023',
  analogy:'TER seperti "diskon pajak pre-calculated" — DJP sudah menghitung tarif flat per bulan agar perusahaan tidak perlu rekonsiliasi tiap bulan. Baru di Desember dilakukan perhitungan sebenarnya.',

 {label:'Expert',title:'Gross Up & e-Bupot Unifikasi',tag:'ADVANCED PPh 21',
  analogy:'Gross Up seperti "menutup hutang pajak karyawan" oleh perusahaan — tapi legal dan justru menguntungkan perusahaan karena tunjangan tersebut jadi biaya deductible.',

  quiz:[{q:'Apa keuntungan fiskal metode Gross Up bagi perusahaan pemberi kerja?',opts:['Tidak ada pajak','Tunjangan pajak jadi biaya deductible','Tarif karyawan turun','Tidak wajib e-Bupot'],ans:1,exp:'Tunjangan pajak dari Gross Up menjadi biaya deductible perusahaan, sehingga PPh Badan lebih kecil.'}]}
]},

 {label:'Dasar',title:'Pekerjaan Bebas — Dikecualikan',tag:'PASAL 56(3) PP 20/2026',
  analogy:'Konten kreator, notaris, dokter — meski omzetnya kecil, tidak bisa ikut tarif 0,5%. Bayangkan seperti dokter spesialis yang tidak bisa antri di poli umum — ada jalur tersendiri.',
  body:`<h3>Penghasilan Dikecualikan dari PPh Final 0,5%</h3>

  quiz:[{q:'Seorang dokter dengan omzet Rp1 Miliar — apakah bisa PPh Final 0,5%?',opts:['Ya, omzet di bawah Rp4,8 M','Tidak, dokter termasuk pekerjaan bebas','Ya, jika mendaftar ke DJP','Tidak, harus PT Perorangan dulu'],ans:1,exp:'Pasal 56(3)a PP 20/2026: penghasilan dari jasa pekerjaan bebas (termasuk dokter) dikecualikan dari PPh Final 0,5%.'}]},
 {label:'Lanjut',title:'Penggabungan Omzet Suami-Istri',tag:'PASAL 58(3) PP 20/2026',
  analogy:'Rezim PPh Final seperti "kartu diskon keluarga" — bukan per individu, tapi per keluarga. DJP menggabungkan omzet suami, istri, dan semua PT Perorangan milik keduanya.',

 {label:'Expert',title:'Tax Planning Pasca PP 20/2026',tag:'STRATEGI BADAN HUKUM',
  analogy:'Memilih struktur badan hukum sekarang seperti memilih jalur tol — CV sudah ditutup 2027, jalan pintas 0,5% hanya tersedia untuk WP OP dan PT Perorangan di jalur yang benar.',

{title:'PPh Badan & Rekonsiliasi Fiskal',emoji:'🏢',color:'c3',day:'Hari 8',
 desc:'Koreksi fiskal, Pasal 20A anti-mafia, dan perhitungan PPh Badan + Pasal 31E',
 levels:[
 {label:'Beginner',title:'Laba Komersial vs Laba Fiskal',tag:'PPh BADAN DASAR',
  analogy:'Laba komersial untuk investor mengikuti PSAK/IFRS. Laba fiskal untuk DJP mengikuti aturan Pasal 6 & 9 UU PPh — ketat tentang biaya apa yang boleh dikurangi.',
  body:`<div class="fbox">Laba Komersial = Pendapatan − Beban (PSAK/IFRS)
Laba Fiskal = Penghasilan Bruto − Biaya 3M (UU PPh)

Biaya 3M = biaya untuk Mendapatkan,
             Menagih, Memelihara penghasilan</div>
<p>Perbedaan laba komersial dan fiskal → perlu koreksi fiskal: positif (menambah PKP) atau negatif (mengurangi PKP).</p>`,
  quiz:[{q:'Apa yang dimaksud "biaya 3M" dalam pajak penghasilan badan?',opts:['Marketing, Manajemen, Maintenance','Mendapatkan, Menagih, Memelihara penghasilan','Minimum, Maksimum, Menengah','Modal, Material, Manusia'],ans:1,exp:'Biaya 3M = biaya untuk Mendapatkan, Menagih, dan Memelihara penghasilan — boleh dikurangi dari penghasilan bruto.'}]},
 {label:'Dasar',title:'Koreksi Fiskal Positif & Negatif',tag:'REKONSILIASI FISKAL',
  analogy:'Koreksi positif seperti "menambah tagihan" karena perusahaan terlalu banyak klaim biaya. Koreksi negatif seperti "memberi diskon" karena ada penghasilan yang tidak kena pajak.',
  body:`<h3>Koreksi Fiskal Positif (Menambah PKP)</h3>
<ul><li>Biaya entertainment tanpa daftar nominatif</li>
<li>Denda pajak & sanksi administrasi (Pasal 9(1)k)</li>
<li>Penyusutan melebihi ketentuan fiskal</li>
<li>Cadangan yang tidak diakui fiskal</li>
<li><b>Biaya suap/gratifikasi → NON-DEDUCTIBLE (PASAL 20A)</b></li></ul>
<h3>Koreksi Fiskal Negatif (Mengurangi PKP)</h3>
<ul><li>Dividen dari perusahaan Indonesia (kepemilikan ≥ 25%) → bukan objek pajak</li>
<li>Penghasilan sudah dikenai PPh Final → tidak digabung ke SPT Badan</li></ul>`,
  quiz:[{q:'Denda keterlambatan pajak yang dibayar perusahaan — perlakuan fiskalnya?',opts:['Deductible karena biaya usaha','Non-deductible — koreksi fiskal positif (Pasal 9(1)k)','Deductible 50%','Tergantung jumlahnya'],ans:1,exp:'Pasal 9(1)k UU PPh: sanksi administrasi pajak tidak boleh dikurangkan dari penghasilan bruto.'}]},
 {label:'Lanjut',title:'Pasal 20A — Anti-Mafia Clause',tag:'PASAL 20A BARU PP 20/2026',
  analogy:'Pasal 20A menutup loophole — sebelumnya biaya suap bisa disamarkan sebagai entertainment dengan daftar nominatif. Sekarang, apapun bentuknya, kalau itu suap/gratifikasi — langsung non-deductible.',
  body:`<h3>Pasal 20A UU PPh (disisipkan PP 20/2026)</h3>
<div class="fbox">Pengeluaran berupa pemberian suap, gratifikasi,
dan/atau pemberian lain (UU Tipikor + UU Anti-Suap),
termasuk kepada pejabat publik asing:
→ NON-DEDUCTIBLE — TIDAK ADA PENGECUALIAN</div>
<table class="tt"><tr><th>Skenario</th><th>Perlakuan</th></tr>
<tr><td>Biaya makan klien + daftar nominatif</td><td class="yes">Deductible ✅</td></tr>
<tr><td>Uang pelicin untuk tender pemerintah</td><td class="no">NON-DEDUCTIBLE (Ps.20A) ❌</td></tr>
<tr><td>Hadiah untuk pejabat publik asing</td><td class="no">NON-DEDUCTIBLE (Ps.20A) ❌</td></tr></table>
<div class="ibox">ℹ️ Latar belakang: Indonesia dalam proses aksesi OECD. OECD mensyaratkan ketentuan eksplisit larangan deductibility biaya suap kepada pejabat publik asing.</div>`,
  quiz:[{q:'Apa yang dimaksud Pasal 20A yang disisipkan melalui PP 20/2026?',opts:['Aturan deductibility biaya riset','Larangan biaya suap/gratifikasi sebagai pengurang penghasilan','Aturan tarif PPh Badan 20%','Ketentuan transfer pricing'],ans:1,exp:'Pasal 20A secara eksplisit melarang biaya suap, gratifikasi sesuai UU Tipikor sebagai pengurang penghasilan bruto — tanpa pengecualian.'}]},
 {label:'Expert',title:'Tarif PPh Badan & Pasal 31E',tag:'TARIF & FASILITAS',
  analogy:'Pasal 31E seperti "subsidi tarif" untuk UMKM yang tumbuh — porsi dari Rp4,8 M pertama dapat diskon 50% dari tarif normal.',
  body:`<div class="fbox">Tarif umum PPh Badan: 22% (Pasal 17(1)b UU PPh)

Fasilitas Pasal 31E (omzet ≤ Rp50 M):
PKP dari omzet ≤ Rp4,8 M → tarif 11% (diskon 50%)
PKP dari omzet > Rp4,8 M → tarif 22% normal

Rumus: PKP Diskon = (Rp4,8M / Total Omzet) × PKP</div>
<h3>Contoh: PT Maju Bersama (2026)</h3>
<table class="tt"><tr><th>Item</th><th>Nilai</th></tr>
<tr><td>PKP</td><td class="fmono">Rp3.195.000.000</td></tr>

 {label:'Lanjut',title:'Dasar Pemotongan PPh 23',tag:'PENENTUAN BRUTO',
  analogy:'Menentukan "bruto" PPh 23 seperti menghitung tagihan kontraktor — kalau ada rincian yang jelas (material vs jasa), pajak hanya atas jasa bersihnya.',
  body:`<div class="ibox">ℹ️ <b>Contoh (PMK 141/2015):</b><br>
PT Jumbo kontrak iklan Rp255 juta (materi Rp100 jt + fee agen Rp5 jt + pasang iklan Rp150 jt).<br>

<p>Aturan umum: bruto = seluruh tagihan (termasuk material). Pengecualian bila ada rincian terpisah material/gaji dengan bukti → PPh 23 hanya atas fee jasa bersih.</p>`,

 {label:'Lanjut',title:'Transfer Pricing Dasar',tag:'PMK 172/2023',

 {label:'Expert',title:'GAAR & Anti-Avoidance',tag:'ANTI TAX AVOIDANCE',
  analogy:'GAAR seperti "polisi pajak" yang tidak hanya melihat bentuk transaksi tapi substansinya — apakah ini bisnis nyata atau hanya skema menghindari pajak?',
  body:`<ul>
<li><b>Substance over Form:</b> DJP dapat mengabaikan bentuk transaksi bila substansinya penghindaran pajak</li>
<li><b>Thin Cap Rules (Pasal 18(1)):</b> Menkeu berwenang menentukan rasio utang-modal</li>
<li><b>CFC Rules (Pasal 18(2)):</b> DJP dapat menetapkan saat dividen diterima dari perusahaan negara rendah pajak</li>
<li><b>Anti Treaty Shopping:</b> P3B dapat ditolak bila terjadi treaty shopping</li>
<li><b>Pasal 20A (SAAR):</b> Menutup celah biaya suap yang disamarkan</li></ul>
<div class="wbox">⚠️ Risiko GAAR: transaksi yang sah secara hukum perdata dapat tetap dikoreaksi DJP bila tujuan utamanya adalah tax avoidance.</div>`,
  quiz:[{q:'Apa yang dimaksud dengan prinsip "Substance over Form" dalam konteks GAAR?',opts:['Mengutamakan bentuk hukum transaksi','DJP dapat mengabaikan bentuk transaksi dan melihat substansi ekonomisnya','Menghitung pajak dari laba akuntansi','Mengikuti standar PSAK'],ans:1,exp:'Substance over Form: DJP dapat mengabaikan bentuk hukum transaksi dan menilai berdasarkan substansi ekonomisnya untuk mencegah penghindaran pajak.'}]}
]},

 {label:'Expert',title:'Audit Coretax & SP2DK',tag:'SOAL 3 & 4',
  analogy:'Menerima SP2DK di era Coretax seperti mendapat "notifikasi merah dari bank" — sistem otomatis mendeteksi gap. Respons yang tepat dan cepat adalah kunci menghindari pemeriksaan formal.',
  body:`<h3>Skenario SP2DK (Soal 3)</h3>

]}

function navigate(page){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const map={dashboard:0,modules:1,quiz:2,simulator:3,kb:4,progress:5};
  const navs=document.querySelectorAll('.nav-item');
  if(map[page]!==undefined)navs[map[page]]?.classList.add('active');
  document.getElementById('tb-title').textContent={dashboard:'Dashboard',modules:'Modul Belajar',quiz:'Quiz Master',simulator:'Simulator Pajak',kb:'Knowledge Base',progress:'Progress & Badge',lesson:'Materi Pembelajaran'}[page]||'Tax Academy';
  const m=document.getElementById('main');
  if(page==='dashboard')m.innerHTML=renderDash();
  else if(page==='modules')m.innerHTML=renderMods();
  else if(page==='quiz')m.innerHTML=renderQuizPage();
  else if(page==='simulator')m.innerHTML=renderSim();
  else if(page==='kb')m.innerHTML=renderKB();
  else if(page==='progress')m.innerHTML=renderProgress();
  else if(page==='lesson')m.innerHTML=renderLesson();
  updateSB();
}

function updateSB(){
  const xpN=LVL_XP[STATE.level]||5000;
  const xpP=LVL_XP[STATE.level-1]||0;
  const pct=Math.min(100,((STATE.xp-xpP)/(xpN-xpP))*100);
  document.getElementById('xp-fill').style.width=pct+'%';
  document.getElementById('sb-xp-val').textContent=STATE.xp+' / '+xpN+' XP';
  document.getElementById('sb-level').textContent='Level '+STATE.level+' — '+(LVL_NAMES[STATE.level-1]||'Expert');
  document.getElementById('streak-val').textContent=STATE.streak;
}

function addXP(n){
  STATE.xp+=n;
  const needed=LVL_XP[STATE.level]||5000;
  if(STATE.xp>=needed&&STATE.level<6){STATE.level++;showToast('🎉 Level Up! Level '+STATE.level+' — '+(LVL_NAMES[STATE.level-1]||'Expert'),'success');}
  updateSB();
}

function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.innerHTML=msg;
  t.style.borderColor=type==='success'?'rgba(16,185,129,0.3)':type==='warn'?'rgba(245,158,11,0.3)':'var(--border2)';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function renderLQ(q,answered,sel){

}

function startQuiz(){
  QS={active:true,qs:[...QUIZ].sort(()=>Math.random()-0.5).slice(0,20),cur:0,score:0,answered:false,sel:null};
  document.getElementById('main').innerHTML=renderQuizPage();
}

function answerQ(i){
  if(QS.answered)return;
  const q=QS.qs[QS.cur];QS.answered=true;QS.sel=i;
  if(i===q.ans){QS.score++;addXP(10);}
  document.getElementById('main').innerHTML=renderQuizPage();
}

function nextQ(){
  if(QS.cur<QS.qs.length-1){QS.cur++;QS.answered=false;QS.sel=null;document.getElementById('main').innerHTML=renderQuizPage();}
  else{
    const sc=QS.score,tot=QS.qs.length;STATE.quizScore=sc;QS.active=false;
    if(sc>=18)addXP(200);else if(sc>=15)addXP(120);else if(sc>=10)addXP(60);
    document.getElementById('main').innerHTML=`<div class="qw" style="text-align:center;padding:40px 0">
    <div style="font-size:4rem;margin-bottom:16px">${sc>=18?'🏆':sc>=15?'🥇':sc>=10?'🥈':'📚'}</div>
    <div class="fsyn" style="font-size:2rem;font-weight:800;color:var(--accent)">${sc}/${tot}</div>
    <div style="font-size:1.1rem;color:var(--text2);margin:8px 0">${Math.round(sc/tot*100)}% Benar</div>
    <div style="color:var(--text3);font-size:0.88rem;margin-bottom:28px">${sc>=18?'Luar biasa! Siap jadi konsultan pajak profesional!':sc>=15?'Sangat baik! Sedikit lagi ke level expert.':sc>=10?'Cukup baik. Pelajari lagi materi yang salah.':'Tetap semangat! Ulangi materi dasar dulu.'}</div>

        <div class="fg"><label class="fl">+ Selisih Penyusutan Fiskal (Rp)</label><input class="fi" id="r-c" type="number" placeholder="0" oninput="cR()"></div>
        <div class="fg"><label class="fl">− Dividen bukan objek pajak (Rp)</label><input class="fi" id="r-dv" type="number" placeholder="0" oninput="cR()"></div>
        <div class="fg"><label class="fl">Omzet Bruto (untuk cek 31E) (Rp)</label><input class="fi" id="r-o" type="number" placeholder="Misal: 25000000000" oninput="cR()"></div>
      </div>
      <div id="rr"><div class="rb" style="color:var(--text3);padding:20px;text-align:center">Masukkan data</div></div>
    </div></div>`;
  return'';
}

function fmt(n){return'Rp '+Number(n).toLocaleString('id-ID');}

function cU(){
  const o=parseFloat(document.getElementById('u-o').value)||0;
  const j=document.getElementById('u-j').value;
  const el=document.getElementById('ur');
  if(!o){el.innerHTML='<div class="rb" style="color:var(--text3);padding:20px;text-align:center">Masukkan omzet</div>';return;}
  const ot=o*12;
  if(j==='bebas'){el.innerHTML=`<div class="rb"><div class="rr"><span>Jenis WP</span><span class="rv" style="color:var(--red)">Pekerjaan Bebas</span></div><div class="rr"><span>PPh Final 0,5%</span><span class="rv" style="color:var(--red)">❌ Tidak Bisa</span></div><div class="rr tot"><span>Rezim Pajak</span><span class="rv">NPPN + Progresif</span></div></div>`;return;}
  if(j==='cv'){const bisa=ot<=4.8e9;el.innerHTML=`<div class="rb"><div class="rr"><span>Omzet Tahunan</span><span class="rv">${fmt(ot)}</span></div><div class="rr"><span>Status CV</span><span class="rv" style="color:var(--accent)">⏳ Transisi s/d 2026</span></div>${bisa?`<div class="rr"><span>PPh Final/bulan</span><span class="rv">${fmt(o*0.005)}</span></div>`:'<div class="rr"><span>Status</span><span class="rv" style="color:var(--red)">Omzet > 4,8M!</span></div>'}<div class="rr tot"><span>Mulai 2027</span><span class="rv" style="color:var(--red)">PPh Badan 22%</span></div></div>`;return;}
  const bisa=ot<=4.8e9;
  el.innerHTML=`<div class="rb"><div class="rr"><span>Omzet/Bulan</span><span class="rv">${fmt(o)}</span></div><div class="rr"><span>Omzet Tahunan</span><span class="rv">${fmt(ot)}</span></div><div class="rr"><span>Batas Rp4,8 M</span><span class="rv" style="color:${bisa?'var(--green)':'var(--red)'}">${bisa?'✅ Memenuhi':'❌ Melebihi'}</span></div>${bisa?`<div class="rr"><span>PPh Final/Bulan (0,5%)</span><span class="rv">${fmt(o*0.005)}</span></div><div class="rr tot"><span>PPh Final Setahun</span><span class="rv">${fmt(ot*0.005)}</span></div>`:`<div class="rr tot"><span>Rezim</span><span class="rv" style="color:var(--red)">PPh Badan Normal</span></div>`}</div>`;
}

function cP(){
  const g=parseFloat(document.getElementById('p-g').value)||0;
  const pk=document.getElementById('p-p').value;
  const bl=parseInt(document.getElementById('p-b').value)||1;
  const el=document.getElementById('pr');
  if(!g){el.innerHTML='<div class="rb" style="color:var(--text3);padding:20px;text-align:center">Masukkan gaji</div>';return;}
  const pm={TK0:54e6,TK1:58.5e6,K0:58.5e6,K1:63e6,K2:67.5e6,K3:72e6};
  const tc={TK0:'A',TK1:'A',K0:'B',K1:'B',K2:'C',K3:'C'};
  const ptkp=pm[pk];const cat=tc[pk];
  const tr=g<=5e6?0:g<=6e6?.01:g<=10.5e6?.015:g<=11e6?.02:g<=15e6?.03:g<=20e6?.05:g<=26e6?.06:g<=50e6?.1:g<=150e6?.15:.2;
  const pb=Math.round(g*tr);
  const gs=g*12;const bj=Math.min(gs*.05,6e6);const nt=gs-bj;const pkp=Math.max(0,nt-ptkp);
  let ps=0;if(pkp<=60e6)ps=pkp*.05;else if(pkp<=250e6)ps=3e6+(pkp-60e6)*.15;else if(pkp<=500e6)ps=31.5e6+(pkp-250e6)*.25;else if(pkp<=5e9)ps=94e6+(pkp-500e6)*.3;else ps=1429e6+(pkp-5e9)*.35;
  const pd=Math.max(0,ps-(pb*11));const pa=bl<12?pb:pd;
  el.innerHTML=`<div class="rb"><div class="rr"><span>Gaji Bruto/Bulan</span><span class="rv">${fmt(g)}</span></div><div class="rr"><span>Kategori TER</span><span class="rv">${cat}</span></div><div class="rr"><span>Tarif TER (estimasi)</span><span class="rv">${(tr*100).toFixed(1)}%</span></div><div class="rr"><span>PPh 21 Jan-Nov/bulan</span><span class="rv">${fmt(pb)}</span></div><div class="rr"><span>PTKP (${pk})</span><span class="rv">${fmt(ptkp)}</span></div><div class="rr"><span>PKP Setahun</span><span class="rv">${fmt(pkp)}</span></div><div class="rr"><span>PPh Terutang Setahun</span><span class="rv">${fmt(Math.round(ps))}</span></div><div class="rr tot"><span>PPh Bulan ke-${bl}</span><span class="rv">${fmt(Math.round(pa))}</span></div></div>`;
}

function cB(){
  const o=parseFloat(document.getElementById('b-o').value)||0;
  const p=parseFloat(document.getElementById('b-p').value)||0;
  const el=document.getElementById('br');
  if(!o||!p){el.innerHTML='<div class="rb" style="color:var(--text3);padding:20px;text-align:center">Masukkan omzet dan PKP</div>';return;}
  const h=o<=50e9;let pph=0,pr=0,pd=0,pn=0;
  if(h){pr=(4.8e9/o)*p;pd=pr*.11;pn=(p-pr)*.22;pph=pd+pn;}else pph=p*.22;
  el.innerHTML=`<div class="rb"><div class="rr"><span>Omzet Bruto</span><span class="rv">${fmt(o)}</span></div><div class="rr"><span>PKP</span><span class="rv">${fmt(p)}</span></div><div class="rr"><span>Fasilitas Pasal 31E</span><span class="rv" style="color:${h?'var(--green)':'var(--red)'}">${h?'✅ Berlaku':'❌ Tidak Berlaku'}</span></div>${h?`<div class="rr"><span>Porsi PKP Diskon (11%)</span><span class="rv">${fmt(Math.round(pr))}</span></div><div class="rr"><span>PPh Porsi Diskon</span><span class="rv">${fmt(Math.round(pd))}</span></div><div class="rr"><span>PPh Porsi Normal (22%)</span><span class="rv">${fmt(Math.round(pn))}</span></div>`:''}<div class="rr tot"><span>Total PPh Badan</span><span class="rv">${fmt(Math.round(pph))}</span></div><div class="rr"><span>Tarif Efektif</span><span class="rv">${(pph/p*100).toFixed(2)}%</span></div></div>`;
}

function cV(){
  const d=parseFloat(document.getElementById('v-d').value)||0;
  const m=parseFloat(document.getElementById('v-m').value)||0;
  const f=document.getElementById('v-f').value;
  const el=document.getElementById('vr');
  if(!d){el.innerHTML='<div class="rb" style="color:var(--text3);padding:20px;text-align:center">Masukkan DPP</div>';return;}
  const pk=f==='ndp'?0:d*.12;const pmk=f==='dbs'?0:m;const ter=pk-pmk;
  el.innerHTML=`<div class="rb"><div class="rr"><span>DPP (Harga Jual)</span><span class="rv">${fmt(d)}</span></div><div class="rr"><span>PK (12% × DPP)</span><span class="rv">${f==='ndp'?'Tidak Dipungut':fmt(pk)}</span></div><div class="rr"><span>PM Dapat Dikreditkan</span><span class="rv" style="color:${f==='dbs'?'var(--red)':'var(--green)'}">${f==='dbs'?'❌ '+fmt(0)+' (dibebaskan)':'✅ '+fmt(pmk)}</span></div><div class="rr tot"><span>${ter>=0?'PPN Kurang Bayar':'PPN Lebih Bayar'}</span><span class="rv" style="color:${ter>=0?'var(--red)':'var(--green)'}">${fmt(Math.abs(Math.round(ter)))}</span></div>${f==='ndp'?'<div style="font-size:0.75rem;color:var(--accent);margin-top:8px">Tidak Dipungut: PM tetap dikreditkan → kemungkinan restitusi ✅</div>':''}${f==='dbs'?'<div style="font-size:0.75rem;color:var(--red);margin-top:8px">Dibebaskan: PM jadi beban biaya — tidak bisa dikreditkan ❌</div>':''}</div>`;
}

function cR(){
  const l=parseFloat(document.getElementById('r-l').value)||0;
  const s=parseFloat(document.getElementById('r-s').value)||0;
  const d=parseFloat(document.getElementById('r-d').value)||0;
  const e=parseFloat(document.getElementById('r-e').value)||0;
  const c=parseFloat(document.getElementById('r-c').value)||0;
  const dv=parseFloat(document.getElementById('r-dv').value)||0;
  const o=parseFloat(document.getElementById('r-o').value)||0;
  const el=document.getElementById('rr');
  if(!l){el.innerHTML='<div class="rb" style="color:var(--text3);padding:20px;text-align:center">Masukkan laba komersial</div>';return;}
  const kp=s+d+e+c;const kn=dv;const pkp=l+kp-kn;
  let pph=0;const h31e=o>0&&o<=50e9;
  if(h31e){const pr=(4.8e9/o)*pkp;pph=(pr*.11)+((pkp-pr)*.22);}else pph=pkp*.22;
  el.innerHTML=`<div class="rb"><div class="rr"><span>Laba Komersial</span><span class="rv">${fmt(l)}</span></div>${s?`<div class="rr"><span>+ Biaya Suap (Ps.20A)</span><span class="rv" style="color:var(--red)">+${fmt(s)}</span></div>`:''} ${d?`<div class="rr"><span>+ Denda Pajak</span><span class="rv" style="color:var(--red)">+${fmt(d)}</span></div>`:''} ${e?`<div class="rr"><span>+ Entertainment</span><span class="rv" style="color:var(--red)">+${fmt(e)}</span></div>`:''} ${c?`<div class="rr"><span>+ Selisih Penyusutan</span><span class="rv" style="color:var(--red)">+${fmt(c)}</span></div>`:''} ${dv?`<div class="rr"><span>− Dividen bukan objek</span><span class="rv" style="color:var(--green)">−${fmt(dv)}</span></div>`:''}<div class="rr" style="border-top:1px solid var(--border2);padding-top:10px"><span><b>PKP</b></span><span class="rv">${fmt(Math.round(pkp))}</span></div>${h31e&&o?`<div class="rr"><span>Fasilitas Pasal 31E</span><span class="rv tg">✅ Berlaku</span></div>`:''}<div class="rr tot"><span>PPh Badan Terutang</span><span class="rv">${fmt(Math.round(pph))}</span></div>${pkp>0?`<div class="rr"><span>Tarif Efektif</span><span class="rv">${(pph/pkp*100).toFixed(2)}%</span></div>`:''}</div>`;
}
  const days=[
  {day:'Hari 1', title:'KUP & Coretax Dasar', body:`
<h4>1.1 Integrasi NIK sebagai NPWP</h4>
<p><span class="ktag law">PMK 81/2024</span> <span class="ktag law">PENG-6/PJ.09/2024</span></p>
<table class="kbt"><tr><th>Jenis WP</th><th>Format NPWP</th></tr>
<tr><td>WP OP Penduduk Indonesia</td><td>NIK (16 digit) ATAU NPWP 15 digit</td></tr>
<tr><td>WP OP Bukan Penduduk</td><td>NPWP 15 digit</td></tr>
<tr><td>WP Badan</td><td>NPWP 15 digit</td></tr></table>
<h4>1.2 Akun Wajib Pajak (AWP)</h4>
<p>AWP adalah "kotak surat digital" resmi WP. Tanggal pengiriman ke AWP = tanggal resmi diterimanya keputusan DJP. WP yang telah memberikan persetujuan AWP: tanggal berlaku = tanggal pengiriman ke AWP.</p>
<h4>1.3 Pembukuan vs Pencatatan (Pasal 28 UU KUP)</h4>
<table class="kbt"><tr><th>Kriteria</th><th>Pembukuan</th><th>Pencatatan</th></tr>
<tr><td>Subjek Wajib</td><td>WP Badan; WP OP omzet ≥ Rp4,8 M</td><td>WP OP omzet &lt; Rp4,8 M</td></tr>
<tr><td>Metode Hitung</td><td>Laba fiskal (Penghasilan − Biaya 3M)</td><td>NPPN</td></tr>
<tr><td>Kewajiban Simpan</td><td colspan="2">Minimal 10 tahun di Indonesia</td></tr></table>`},
  {day:'Hari 2', title:'KUP Lanjutan — SKP & Sanksi', body:`
<h4>2.1 Hierarki SKP</h4>
<p>STP → SKPKB → SKPKBT → SKPN → SKPLB. SKPKB dalam 5 tahun sejak saat terutangnya pajak.</p>
<h4>2.2 Sanksi SKPKB (UU HPP)</h4>
<p>Sanksi bunga = (Suku Bunga Acuan + 20%) ÷ 12, per bulan, maksimum 24 bulan. Tidak lagi flat 2%/bulan.</p>
<h4>2.3 Keberatan & Banding</h4>
<ul><li>Keberatan: 3 bulan sejak SKPKB, SK terbit 12 bulan</li>
<li>Banding: 3 bulan sejak SK Keberatan, syarat bayar 50% SKPKB</li>
<li>Denda keberatan ditolak: 50% × selisih</li>
<li>Denda banding ditolak: 100% × selisih</li></ul>`},
  {day:'Hari 3', title:'SP2DK & Mitigasi Coretax', body:`
<h4>3.1 SP2DK Era Coretax</h4>
<p>SP2DK adalah instrumen DJP menanyakan perbedaan data tanpa memulai pemeriksaan formal. Batas respons: <b>14 hari kerja</b> sejak diterima di AWP. Tidak direspons → Surat Perintah Pemeriksaan (SP2).</p>
<h4>3.2 Strategi Mitigasi</h4>
<ul><li>Cek AWP rutin minimal 2x/minggu</li>
<li>Rekonsiliasi SPT PPN vs PPh Badan setiap kuartal</li>
<li>Bila ada gap: ajukan pembetulan SPT (sanksi lebih ringan dari SKPKB)</li></ul>`},
  {day:'Hari 4', title:'PPh 21 — Subjek & Tarif', body:`

<h4>4.2 PTKP Terkini</h4>

<tr><td>&gt; Rp5 M</td><td>35% (baru UU HPP)</td></tr></table>`},
  {day:'Hari 5', title:'TER & Gross Up PPh 21', body:`
<h4>5.1 TER (PP 58/2023)</h4>
<p>3 Kategori: A (TK/0, TK/1), B (K/0, K/1, TK/2, TK/3), C (K/2, K/3). Mekanisme: Jan-Nov gunakan tarif TER, Desember rekonsiliasi Pasal 17.</p>
<h4>5.2 Gross Up</h4>
<p>Tunjangan pajak senilai PPh 21 terutang diberikan pemberi kerja. Lapisan 5%: Tunjangan = PKP × (5/95). Manfaat: tunjangan pajak = biaya deductible → PPh Badan lebih kecil.</p>
<h4>5.3 e-Bupot Unifikasi</h4>
<p>Menggabungkan PPh 4(2), 15, 22, 23, 26. Data dicocokkan otomatis dengan SPT karyawan. Ketidaksesuaian → SP2DK.</p>`},
  {day:'Hari 6', title:'PPh Potput — Pasal 22 & 23', body:`
<h4>6.1 PPh Pasal 22 Impor</h4>
<table class="kbt"><tr><th>Kondisi</th><th>Tarif</th></tr>
<tr><td>Menggunakan API</td><td>2,5%</td></tr>
<tr><td>Tanpa API</td><td>7,5%</td></tr>
<tr><td>Barang mewah tertentu</td><td>10%</td></tr>
<tr><td>Tanpa NPWP</td><td>+100% dari tarif normal</td></tr></table>
<h4>6.2 PPh Pasal 23 Jasa</h4>
<p>Tarif 2% (tanpa NPWP: 4%). Dasar pengenaan: bruto = seluruh tagihan, kecuali ada rincian material terpisah → hanya atas fee jasa bersih. Daftar jasa: PMK 141/2015.</p>`},
  {day:'Hari 7', title:'PPh Final UMKM — PP 20/2026', body:`
<h4>7.1 Latar Belakang PP 20/2026</h4>
<p>Dua tujuan: (1) Penyempurnaan keadilan rezim PPh Final 0,5%; (2) Anti-KKN/OECD Compliance melalui Pasal 20A baru.</p>
<h4>7.2 Subjek yang BOLEH (omzet ≤ Rp4,8 M)</h4>
<p>✅ WP OP (bukan pekerjaan bebas), PT Perorangan, Koperasi. ❌ CV (transisi s/d akhir 2026), PT Biasa, Firma, WP OP Pekerjaan Bebas (Pasal 56(3)a).</p>
<h4>7.3 Penggabungan Omzet Suami-Istri (Pasal 58(3))</h4>
<p>Total = Omzet Suami + Omzet Istri + Omzet semua PT Perorangan (suami DAN istri). Dibandingkan batas Rp4,8 M.</p>`},
  {day:'Hari 8', title:'PPh Badan & Anti-Mafia', body:`
<h4>8.1 Rekonsiliasi Fiskal</h4>
<p>Koreksi Positif (menambah PKP): biaya entertainment tanpa nominatif, denda pajak (Ps.9(1)k), selisih penyusutan, biaya suap (Ps.20A).</p>
<p>Koreksi Negatif (mengurangi PKP): dividen dari perusahaan Indonesia kepemilikan ≥25%, penghasilan sudah dikenai PPh Final.</p>
<h4>8.2 Pasal 20A — Anti-Mafia Clause <span class="ktag new">BARU</span></h4>
<p>Biaya suap, gratifikasi sesuai UU Tipikor: NON-DEDUCTIBLE tanpa pengecualian. Latar belakang: aksesi OECD.</p>
<h4>8.3 Tarif & Fasilitas Pasal 31E</h4>
<p>Tarif umum: 22%. Fasilitas Pasal 31E (omzet ≤ Rp50 M): porsi PKP dari omzet ≤Rp4,8 M mendapat tarif 11% (diskon 50%).</p>`},
  {day:'Hari 9', title:'PPN 2026 Dasar', body:`
<h4>9.1 Tarif PPN 12% (berlaku 1 Januari 2025)</h4>
<p>Tarif naik dari 11% menjadi 12% (UU HPP). Ekspor BKP/JKP: 0%.</p>
<h4>9.2 BKP & JKP Dikecualikan</h4>
<p>Bukan BKP: hasil tambang langsung, kebutuhan pokok (beras, jagung, sagu, kedelai, garam, daging, telur, susu, buah, sayuran), uang, emas batangan, surat berharga.</p>
<p>Bukan JKP: jasa kesehatan, keuangan, pendidikan, tenaga kerja, perhotelan, keagamaan, penyiaran non-iklan, angkutan umum.</p>
<h4>9.3 Fasilitas PPN</h4>

<tr><td>PM dikreditkan?</td><td>YA ✅</td><td>TIDAK ❌</td></tr></table>`},
  {day:'Hari 10', title:'PPN Pro — Faktur Pajak', body:`
<h4>10.1 Syarat Faktur Pajak SAH (Pasal 13(5))</h4>
<p>Nama/alamat/NPWP penjual dan pembeli, jenis BKP/JKP, jumlah harga, PPN, kode/nomor seri/tanggal, tanda tangan. Era Coretax: penomoran otomatis, TTD digital.</p>
<h4>10.2 Faktur Pajak Cacat</h4>

<tr><td>Diterbitkan</td><td>Pembeli BKP</td><td>Penerima JKP</td></tr>
<tr><td>Efek PPN</td><td>PK penjual ↓, PM pembeli ↓</td><td>PK penyedia ↓, PM penerima ↓</td></tr></table>`},
  {day:'Hari 11', title:'Transfer Pricing & GAAR', body:`
<h4>11.1 Transfer Pricing</h4>
<p>Hubungan Istimewa (Pasal 18(4)): kepemilikan ≥25%, penguasaan manajemen/teknologi, hubungan keluarga satu derajat.</p>
<p>Metode: CUP, CPM (Cost Plus), RPM (Resale Price), TNMM (paling umum), PSM (Profit Split).</p>
<p>Dokumentasi (PMK 172/2023): Master File + Local File. CbCR wajib untuk omzet konsolidasi ≥ Rp11 triliun.</p>
<h4>11.2 GAAR</h4>
<ul><li><b>Substance over Form:</b> DJP menilai substansi ekonomis, bukan bentuk hukum</li>
<li><b>Thin Cap Rules (Pasal 18(1)):</b> Rasio utang-modal</li>
<li><b>CFC Rules (Pasal 18(2)):</b> Penentuan saat dividen dari negara rendah pajak</li>
<li><b>Anti Treaty Shopping, Pasal 20A (SAAR)</b></li></ul>`},
  {day:'Hari 12', title:'Studi Kasus Komprehensif', body:`
<h4>12.1 Kasus PT Maju Bersama Grup (Tahun Pajak 2026)</h4>
<table class="kbt"><tr><th>Entitas</th><th>Omzet</th></tr>
<tr><td>PT Maju Bersama (alat bangunan) — Hendra 50%+Dewi 50%</td><td>Rp25 M</td></tr>
<tr><td>PT Perorangan HB (Tuan Hendra)</td><td>Rp1,5 M</td></tr>
<tr><td>CV Dewi Jaya (Nyonya Dewi)</td><td>Rp2 M</td></tr></table>
<h4>12.2 Rekonsiliasi Fiskal PT Maju Bersama</h4>
<p>Laba Komersial Rp3 M + biaya gratifikasi Ps.20A Rp80 juta + denda pajak Rp15 juta + selisih penyusutan Rp100 juta = PKP Rp3.195.000.000.</p>
